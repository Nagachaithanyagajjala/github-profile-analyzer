<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>gh-analyzer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #0a0e0c;
    --bg-raised: #101512;
    --border: #1f2b25;
    --border-bright: #2d4038;
    --text: #d9e4dd;
    --text-dim: #6f8377;
    --accent: #6bffa8;
    --accent-dim: #2f6b4c;
    --error: #ff6b5b;
    --warn: #ffc86b;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:
      radial-gradient(circle at 15% 0%, rgba(107,255,168,0.05), transparent 40%),
      var(--bg);
    color:var(--text);
    font-family:'JetBrains Mono', monospace;
    min-height:100vh;
    line-height:1.5;
  }
  ::selection{background:var(--accent-dim); color:#fff;}

  a{color:var(--accent); text-decoration:none;}
  a:hover{text-decoration:underline;}

  .wrap{max-width:920px; margin:0 auto; padding:0 20px 80px;}

  /* ---------- Top bar ---------- */
  header.topbar{
    border-bottom:1px solid var(--border);
    padding:18px 0;
    margin-bottom:40px;
  }
  header.topbar .wrap{display:flex; align-items:center; justify-content:space-between;}
  .brand{
    font-family:'Space Grotesk', sans-serif;
    font-weight:600;
    font-size:16px;
    letter-spacing:0.02em;
    display:flex;
    align-items:center;
    gap:10px;
  }
  .brand .dot{width:8px; height:8px; border-radius:50%; background:var(--accent); box-shadow:0 0 8px var(--accent);}
  .brand .prompt-tail{color:var(--text-dim); font-weight:400;}
  .health-pill{
    font-size:11px; color:var(--text-dim); border:1px solid var(--border);
    padding:4px 10px; border-radius:20px; display:flex; align-items:center; gap:6px;
  }
  .health-pill .led{width:6px; height:6px; border-radius:50%; background:var(--text-dim);}
  .health-pill.ok .led{background:var(--accent); box-shadow:0 0 6px var(--accent);}
  .health-pill.bad .led{background:var(--error); box-shadow:0 0 6px var(--error);}

  /* ---------- Hero / search ---------- */
  .hero{margin-bottom:48px;}
  .hero h1{
    font-family:'Space Grotesk', sans-serif;
    font-size:clamp(24px, 4vw, 34px);
    font-weight:600;
    margin:0 0 8px;
    letter-spacing:-0.01em;
  }
  .hero p{color:var(--text-dim); margin:0 0 28px; font-size:14px;}

  .prompt-form{
    display:flex;
    align-items:center;
    background:var(--bg-raised);
    border:1px solid var(--border-bright);
    border-radius:8px;
    padding:4px 4px 4px 16px;
    gap:8px;
    transition:border-color .15s ease, box-shadow .15s ease;
  }
  .prompt-form:focus-within{
    border-color:var(--accent-dim);
    box-shadow:0 0 0 3px rgba(107,255,168,0.08);
  }
  .prompt-form .sigil{color:var(--accent); font-weight:700; flex-shrink:0;}
  .prompt-form .cmd{color:var(--text-dim); flex-shrink:0; white-space:nowrap;}
  .prompt-form input{
    flex:1;
    background:transparent;
    border:none;
    outline:none;
    color:var(--text);
    font-family:inherit;
    font-size:14px;
    padding:12px 0;
    min-width:80px;
  }
  .prompt-form input::placeholder{color:#3a4a41;}
  .prompt-form button{
    background:var(--accent);
    color:#04150c;
    border:none;
    border-radius:6px;
    padding:11px 18px;
    font-family:'Space Grotesk', sans-serif;
    font-weight:600;
    font-size:13px;
    cursor:pointer;
    white-space:nowrap;
    transition:transform .1s ease, background .15s ease;
  }
  .prompt-form button:hover{background:#84ffbb;}
  .prompt-form button:active{transform:scale(0.97);}
  .prompt-form button:disabled{background:var(--border-bright); color:var(--text-dim); cursor:progress;}

  .hint-row{display:flex; gap:8px; margin-top:10px; flex-wrap:wrap;}
  .hint-chip{
    font-size:11px; color:var(--text-dim); border:1px solid var(--border);
    padding:4px 9px; border-radius:20px; cursor:pointer; background:none; font-family:inherit;
  }
  .hint-chip:hover{border-color:var(--accent-dim); color:var(--accent);}

  /* ---------- Terminal result card ---------- */
  .term-card{
    background:var(--bg-raised);
    border:1px solid var(--border);
    border-radius:10px;
    overflow:hidden;
    margin-bottom:48px;
    display:none;
  }
  .term-card.show{display:block; animation:rise .25s ease;}
  @keyframes rise{ from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:translateY(0);} }

  .term-chrome{
    display:flex; align-items:center; gap:6px;
    padding:10px 14px; border-bottom:1px solid var(--border);
    background:rgba(255,255,255,0.02);
  }
  .term-chrome .dotc{width:10px; height:10px; border-radius:50%;}
  .term-chrome .dotc:nth-child(1){background:#5f5751;}
  .term-chrome .dotc:nth-child(2){background:#5f5751;}
  .term-chrome .dotc:nth-child(3){background:#5f5751;}
  .term-chrome .title{margin-left:8px; font-size:12px; color:var(--text-dim);}

  .term-body{padding:24px;}
  .term-body.loading, .term-body.errored{padding:20px 24px;}

  .neofetch{display:flex; gap:28px; flex-wrap:wrap;}
  .neofetch img{width:96px; height:96px; border-radius:10px; border:1px solid var(--border-bright); flex-shrink:0;}
  .neofetch .stats{flex:1; min-width:260px;}
  .stat-line{display:flex; gap:10px; font-size:13px; padding:3px 0;}
  .stat-line .k{color:var(--accent); min-width:150px; flex-shrink:0;}
  .stat-line .v{color:var(--text); word-break:break-word;}
  .handle{font-family:'Space Grotesk', sans-serif; font-size:19px; font-weight:600; margin-bottom:2px;}
  .handle .at{color:var(--text-dim); font-weight:500;}
  .bio-line{color:var(--text-dim); font-size:13px; margin-bottom:16px;}

  .lang-bars{margin-top:20px; border-top:1px solid var(--border); padding-top:16px;}
  .lang-bars .label{color:var(--text-dim); font-size:11px; text-transform:uppercase; letter-spacing:0.08em; margin-bottom:10px;}
  .lang-row{display:flex; align-items:center; gap:10px; font-size:12px; padding:3px 0;}
  .lang-row .name{width:90px; flex-shrink:0; color:var(--text-dim);}
  .lang-row .bar{flex:1; height:6px; background:var(--border); border-radius:3px; overflow:hidden;}
  .lang-row .bar > span{display:block; height:100%; background:var(--accent); border-radius:3px;}
  .lang-row .pct{width:36px; text-align:right; color:var(--text-dim); flex-shrink:0;}

  .badges{display:flex; gap:8px; margin-top:16px; flex-wrap:wrap;}
  .badge{font-size:11px; padding:4px 9px; border-radius:5px; border:1px solid var(--border-bright); color:var(--text-dim);}
  .badge.active{color:var(--accent); border-color:var(--accent-dim);}

  .err-line{color:var(--error); font-size:13px;}
  .err-line .sigil{color:var(--error); margin-right:6px;}
  .loading-line{color:var(--text-dim); font-size:13px; display:flex; align-items:center; gap:8px;}
  .cursor{display:inline-block; width:7px; height:14px; background:var(--accent); animation:blink 1s step-end infinite;}
  @keyframes blink{ 50%{opacity:0;} }

  /* ---------- Stored profiles list ---------- */
  .section-head{
    display:flex; align-items:center; justify-content:space-between;
    margin-bottom:16px; flex-wrap:wrap; gap:12px;
  }
  .section-head h2{
    font-family:'Space Grotesk', sans-serif; font-size:15px; font-weight:600; margin:0;
    display:flex; align-items:center; gap:8px;
  }
  .section-head h2 .count{color:var(--text-dim); font-weight:400; font-size:13px;}

  .controls{display:flex; gap:8px; flex-wrap:wrap;}
  .controls input, .controls select{
    background:var(--bg-raised); border:1px solid var(--border); color:var(--text);
    font-family:inherit; font-size:12px; padding:7px 10px; border-radius:6px; outline:none;
  }
  .controls input:focus, .controls select:focus{border-color:var(--accent-dim);}
  .controls input{width:150px;}

  .log-list{border:1px solid var(--border); border-radius:10px; overflow:hidden;}
  .log-row{
    display:grid;
    grid-template-columns:22px 1fr auto auto auto 70px;
    align-items:center;
    gap:14px;
    padding:12px 16px;
    border-bottom:1px solid var(--border);
    cursor:pointer;
    font-size:13px;
    transition:background .12s ease;
  }
  .log-row:last-child{border-bottom:none;}
  .log-row:hover{background:rgba(107,255,168,0.04);}
  .log-row .glyph{color:var(--accent-dim);}
  .log-row .uname{font-weight:600; color:var(--text);}
  .log-row .meta{color:var(--text-dim); font-size:12px;}
  .log-row .num{color:var(--text-dim); font-size:12px; text-align:right;}
  .log-row .del-btn{
    background:none; border:1px solid var(--border); color:var(--text-dim);
    font-family:inherit; font-size:11px; padding:4px 8px; border-radius:5px; cursor:pointer;
  }
  .log-row .del-btn:hover{border-color:var(--error); color:var(--error);}

  .empty-state{padding:40px 20px; text-align:center; color:var(--text-dim); font-size:13px;}
  .empty-state .sigil{color:var(--accent); display:block; margin-bottom:8px; font-size:20px;}

  .pager{display:flex; justify-content:center; align-items:center; gap:14px; margin-top:18px; font-size:12px; color:var(--text-dim);}
  .pager button{
    background:var(--bg-raised); border:1px solid var(--border); color:var(--text);
    font-family:inherit; font-size:12px; padding:6px 12px; border-radius:6px; cursor:pointer;
  }
  .pager button:disabled{opacity:0.35; cursor:default;}
  .pager button:not(:disabled):hover{border-color:var(--accent-dim);}

  footer{
    margin-top:60px; padding-top:20px; border-top:1px solid var(--border);
    color:var(--text-dim); font-size:12px; display:flex; justify-content:space-between; flex-wrap:wrap; gap:8px;
  }

  @media (max-width:600px){
    .log-row{grid-template-columns:18px 1fr auto; }
    .log-row .meta, .log-row .num:not(:last-child){display:none;}
    .neofetch img{width:72px; height:72px;}
  }

  @media (prefers-reduced-motion: reduce){
    .term-card.show, .cursor{animation:none;}
  }
</style>
</head>
<body>

<header class="topbar">
  <div class="wrap">
    <div class="brand"><span class="dot"></span>gh-analyzer<span class="prompt-tail">&nbsp;/profile-insights</span></div>
    <div class="health-pill" id="healthPill"><span class="led"></span><span id="healthText">checking…</span></div>
  </div>
</header>

<main class="wrap">

  <section class="hero">
    <h1>Analyze any GitHub profile</h1>
    <p>Pull public stats, star totals, top language, and activity signal — stored for later lookup.</p>

    <form class="prompt-form" id="analyzeForm">
      <span class="sigil">$</span>
      <span class="cmd">analyze</span>
      <input type="text" id="usernameInput" placeholder="octocat" autocomplete="off" spellcheck="false" />
      <button type="submit" id="analyzeBtn">Run</button>
    </form>
    <div class="hint-row">
      <button type="button" class="hint-chip" data-username="torvalds">torvalds</button>
      <button type="button" class="hint-chip" data-username="gaearon">gaearon</button>
      <button type="button" class="hint-chip" data-username="sindresorhus">sindresorhus</button>
    </div>
  </section>

  <div class="term-card" id="termCard">
    <div class="term-chrome">
      <span class="dotc"></span><span class="dotc"></span><span class="dotc"></span>
      <span class="title" id="termTitle">result</span>
    </div>
    <div class="term-body" id="termBody"></div>
  </div>

  <section>
    <div class="section-head">
      <h2>Stored profiles <span class="count" id="storedCount"></span></h2>
      <div class="controls">
        <input type="text" id="searchInput" placeholder="search username…" />
        <select id="sortSelect">
          <option value="created_at">Recently added</option>
          <option value="followers">Followers</option>
          <option value="total_stars">Total stars</option>
          <option value="public_repos">Public repos</option>
          <option value="account_age_days">Account age</option>
          <option value="username">Username</option>
        </select>
      </div>
    </div>

    <div class="log-list" id="logList"></div>
    <div class="pager" id="pager"></div>
  </section>

  <footer>
    <span>gh-analyzer API — Node.js · Express · MySQL</span>
    <span><a href="/api/profiles" target="_blank">raw API</a> · <a href="/health" target="_blank">health</a></span>
  </footer>

</main>

<script>
const API = '/api/profiles';
let currentPage = 1;
const PAGE_LIMIT = 8;

// ---------- Health check ----------
async function checkHealth(){
  const pill = document.getElementById('healthPill');
  const text = document.getElementById('healthText');
  try{
    const res = await fetch('/health');
    if(!res.ok) throw new Error();
    pill.classList.add('ok');
    text.textContent = 'online';
  }catch{
    pill.classList.add('bad');
    text.textContent = 'offline';
  }
}

// ---------- Helpers ----------
function esc(str){
  if(str === null || str === undefined) return '';
  return String(str).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function fmtNum(n){
  if(n === null || n === undefined) return '0';
  return Number(n).toLocaleString();
}
function timeAgo(dateStr){
  if(!dateStr) return 'never';
  const diffMs = Date.now() - new Date(dateStr).getTime();
  const mins = Math.floor(diffMs / 60000);
  if(mins < 1) return 'just now';
  if(mins < 60) return mins + 'm ago';
  const hrs = Math.floor(mins / 60);
  if(hrs < 24) return hrs + 'h ago';
  const days = Math.floor(hrs / 24);
  return days + 'd ago';
}

// ---------- Terminal result card ----------
function showTermCard(){ document.getElementById('termCard').classList.add('show'); }

function renderLoading(username){
  showTermCard();
  document.getElementById('termTitle').textContent = 'analyzing ' + username;
  document.getElementById('termBody').innerHTML = `
    <div class="loading-line">$ fetching github.com/${esc(username)} <span class="cursor"></span></div>
  `;
}

function renderError(username, message){
  showTermCard();
  document.getElementById('termTitle').textContent = 'error';
  document.getElementById('termBody').innerHTML = `
    <div class="err-line"><span class="sigil">✕</span>${esc(message)}</div>
  `;
}

function renderProfile(p){
  showTermCard();
  document.getElementById('termTitle').textContent = p.username + ' — analysis complete';

  const langs = (() => {
    try{
      const parsed = typeof p.language_breakdown === 'string' ? JSON.parse(p.language_breakdown) : (p.language_breakdown || {});
      const total = Object.values(parsed).reduce((a,b)=>a+b,0) || 1;
      return Object.entries(parsed)
        .sort((a,b)=>b[1]-a[1])
        .slice(0,5)
        .map(([name,count]) => ({name, pct: Math.round((count/total)*100)}));
    }catch{ return []; }
  })();

  const langRows = langs.map(l => `
    <div class="lang-row">
      <span class="name">${esc(l.name)}</span>
      <span class="bar"><span style="width:${l.pct}%"></span></span>
      <span class="pct">${l.pct}%</span>
    </div>
  `).join('') || '<div class="lang-row"><span class="meta">no language data</span></div>';

  document.getElementById('termBody').innerHTML = `
    <div class="neofetch">
      <img src="${esc(p.avatar_url || '')}" alt="${esc(p.username)} avatar" onerror="this.style.display='none'"/>
      <div class="stats">
        <div class="handle">${esc(p.name || p.username)} <span class="at">@${esc(p.username)}</span></div>
        <div class="bio-line">${esc(p.bio || 'no bio')}</div>

        <div class="stat-line"><span class="k">public_repos</span><span class="v">${fmtNum(p.public_repos)}</span></div>
        <div class="stat-line"><span class="k">followers</span><span class="v">${fmtNum(p.followers)} (following ${fmtNum(p.following)})</span></div>
        <div class="stat-line"><span class="k">total_stars</span><span class="v">${fmtNum(p.total_stars)} across non-fork repos</span></div>
        <div class="stat-line"><span class="k">avg_stars/repo</span><span class="v">${p.avg_stars_per_repo ?? 0}</span></div>
        <div class="stat-line"><span class="k">top_language</span><span class="v">${esc(p.top_language || '—')}</span></div>
        <div class="stat-line"><span class="k">most_starred</span><span class="v">${esc(p.most_starred_repo || '—')} (${fmtNum(p.most_starred_repo_stars)}★)</span></div>
        <div class="stat-line"><span class="k">account_age</span><span class="v">${fmtNum(p.account_age_days)} days</span></div>
        <div class="stat-line"><span class="k">last_analyzed</span><span class="v">${timeAgo(p.last_analyzed_at)}</span></div>

        <div class="badges">
          <span class="badge ${p.is_active_recently ? 'active' : ''}">${p.is_active_recently ? '● active last 6mo' : '○ inactive 6mo+'}</span>
          <span class="badge">${fmtNum(p.repos_scanned)} repos scanned</span>
        </div>
      </div>
    </div>

    <div class="lang-bars">
      <div class="label">Language breakdown</div>
      ${langRows}
    </div>
  `;
}

// ---------- Analyze form ----------
document.getElementById('analyzeForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const input = document.getElementById('usernameInput');
  const username = input.value.trim();
  if(!username) return;
  runAnalysis(username);
});

document.querySelectorAll('.hint-chip').forEach(chip => {
  chip.addEventListener('click', () => {
    document.getElementById('usernameInput').value = chip.dataset.username;
    runAnalysis(chip.dataset.username);
  });
});

async function runAnalysis(username){
  const btn = document.getElementById('analyzeBtn');
  btn.disabled = true;
  btn.textContent = 'Running…';
  renderLoading(username);
  try{
    const res = await fetch(`${API}/analyze/${encodeURIComponent(username)}`, { method: 'POST' });
    const body = await res.json();
    if(!res.ok || !body.success){
      renderError(username, body.message || 'Analysis failed.');
    }else{
      renderProfile(body.data);
      loadList(); // refresh stored list
    }
  }catch(err){
    renderError(username, 'Could not reach the API. Is the server running?');
  }finally{
    btn.disabled = false;
    btn.textContent = 'Run';
  }
}

// ---------- Stored profiles list ----------
async function loadList(){
  const search = document.getElementById('searchInput').value.trim();
  const sortBy = document.getElementById('sortSelect').value;
  const params = new URLSearchParams({
    page: currentPage, limit: PAGE_LIMIT, sortBy, order: 'DESC', search,
  });

  const listEl = document.getElementById('logList');
  const pagerEl = document.getElementById('pager');

  try{
    const res = await fetch(`${API}?${params.toString()}`);
    const body = await res.json();
    if(!res.ok || !body.success){
      listEl.innerHTML = `<div class="empty-state"><span class="sigil">✕</span>Could not load stored profiles.</div>`;
      pagerEl.innerHTML = '';
      return;
    }

    document.getElementById('storedCount').textContent = `(${body.pagination.total})`;

    if(!body.data.length){
      listEl.innerHTML = `<div class="empty-state"><span class="sigil">◌</span>No profiles analyzed yet — run one above.</div>`;
      pagerEl.innerHTML = '';
      return;
    }

    listEl.innerHTML = body.data.map(p => `
      <div class="log-row" data-username="${esc(p.username)}">
        <span class="glyph">›</span>
        <span class="uname">${esc(p.username)}</span>
        <span class="meta">${fmtNum(p.total_stars)}★ total</span>
        <span class="num">${fmtNum(p.followers)} followers</span>
        <span class="num">${timeAgo(p.last_analyzed_at)}</span>
        <button class="del-btn" data-del="${esc(p.username)}">delete</button>
      </div>
    `).join('');

    const { page, totalPages } = body.pagination;
    pagerEl.innerHTML = totalPages > 1 ? `
      <button id="prevBtn" ${page <= 1 ? 'disabled' : ''}>← prev</button>
      <span>page ${page} / ${totalPages}</span>
      <button id="nextBtn" ${page >= totalPages ? 'disabled' : ''}>next →</button>
    ` : '';

    document.getElementById('prevBtn')?.addEventListener('click', () => { currentPage--; loadList(); });
    document.getElementById('nextBtn')?.addEventListener('click', () => { currentPage++; loadList(); });

    listEl.querySelectorAll('.log-row').forEach(row => {
      row.addEventListener('click', (e) => {
        if(e.target.closest('.del-btn')) return;
        const username = row.dataset.username;
        document.getElementById('usernameInput').value = username;
        loadStoredProfile(username);
        window.scrollTo({top:0, behavior:'smooth'});
      });
    });

    listEl.querySelectorAll('.del-btn').forEach(btn => {
      btn.addEventListener('click', async (e) => {
        e.stopPropagation();
        const username = btn.dataset.del;
        if(!confirm(`Delete stored profile "${username}"?`)) return;
        await fetch(`${API}/${encodeURIComponent(username)}`, { method: 'DELETE' });
        loadList();
      });
    });

  }catch(err){
    listEl.innerHTML = `<div class="empty-state"><span class="sigil">✕</span>Could not reach the API.</div>`;
    pagerEl.innerHTML = '';
  }
}

async function loadStoredProfile(username){
  showTermCard();
  document.getElementById('termTitle').textContent = username + ' — from database';
  document.getElementById('termBody').innerHTML = `<div class="loading-line">$ reading stored record <span class="cursor"></span></div>`;
  try{
    const res = await fetch(`${API}/${encodeURIComponent(username)}`);
    const body = await res.json();
    if(!res.ok || !body.success){
      renderError(username, body.message || 'Not found.');
    }else{
      renderProfile(body.data);
    }
  }catch{
    renderError(username, 'Could not reach the API.');
  }
}

document.getElementById('searchInput').addEventListener('input', () => {
  currentPage = 1;
  clearTimeout(window._searchTimer);
  window._searchTimer = setTimeout(loadList, 300);
});
document.getElementById('sortSelect').addEventListener('change', () => {
  currentPage = 1;
  loadList();
});

// ---------- Init ----------
checkHealth();
loadList();
</script>
</body>
</html>
